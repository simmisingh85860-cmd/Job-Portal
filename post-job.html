<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Post a Job - JobPortal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<nav>
  <a href="index.html" class="logo">&#128188; JobPortal</a>
  <ul>
    <li><a href="jobs.html">Browse Jobs</a></li>
    <li><a href="post-job.html">Post a Job</a></li>
    <li><a href="register.html">Register</a></li>
    <li><a href="login.html">Login</a></li>
  </ul>
</nav>

<div class="form-container" style="max-width:600px;">
  <h2>&#128221; Post a Job</h2>
  <div id="postAlert"></div>

  <!--
    In production this form submits to the Java Servlet:
    action="JobServlet" method="POST"
  -->
  <form id="postJobForm" onsubmit="submitJob(event)">
    <div class="form-group">
      <label>Job Title *</label>
      <input type="text" name="title" placeholder="e.g. Senior Java Developer" required />
    </div>
    <div class="form-group">
      <label>Company Name *</label>
      <input type="text" name="company" placeholder="Your company name" required />
    </div>
    <div class="form-group">
      <label>Location *</label>
      <input type="text" name="location" placeholder="e.g. New York, NY or Remote" required />
    </div>
    <div class="form-group">
      <label>Category *</label>
      <select name="category" required>
        <option value="">Select category</option>
        <option>IT</option>
        <option>Finance</option>
        <option>Healthcare</option>
        <option>Marketing</option>
        <option>Education</option>
        <option>Design</option>
      </select>
    </div>
    <div class="form-group">
      <label>Job Type *</label>
      <select name="type" required>
        <option value="">Select type</option>
        <option>Full-time</option>
        <option>Part-time</option>
        <option>Remote</option>
        <option>Internship</option>
      </select>
    </div>
    <div class="form-group">
      <label>Salary Range</label>
      <input type="text" name="salary" placeholder="e.g. $60,000 - $80,000" />
    </div>
    <div class="form-group">
      <label>Job Description *</label>
      <textarea name="description" placeholder="Describe the role, responsibilities..." required></textarea>
    </div>
    <div class="form-group">
      <label>Requirements</label>
      <textarea name="requirements" placeholder="Required skills, experience, education..."></textarea>
    </div>
    <div class="form-group">
      <label>Contact Email *</label>
      <input type="email" name="email" placeholder="hr@company.com" required />
    </div>
    <button type="submit" class="btn">Post Job</button>
  </form>
</div>

<footer>
  <p>&copy; 2026 JobPortal. All rights reserved.</p>
</footer>

<script src="script.js"></script>
</body>
</html>

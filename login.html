<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - JobPortal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<nav>
  <a href="index.html" class="logo">&#128188; JobPortal</a>
  <ul>
    <li><a href="jobs.html">Browse Jobs</a></li>
    <li><a href="post-job.html">Post a Job</a></li>
    <li><a href="register.html">Register</a></li>
    <li><a href="login.html">Login</a></li>
  </ul>
</nav>

<div class="form-container">
  <h2>&#128274; Login</h2>
  <div id="loginAlert"></div>

  <!--
    In production: action="LoginServlet" method="POST"
  -->
  <form id="loginForm" onsubmit="submitLogin(event)">
    <div class="form-group">
      <label>Email Address *</label>
      <input type="email" name="email" placeholder="you@example.com" required />
    </div>
    <div class="form-group">
      <label>Password *</label>
      <input type="password" name="password" placeholder="Your password" required />
    </div>
    <div class="form-group" style="display:flex; justify-content:space-between; align-items:center;">
      <label style="display:flex; align-items:center; gap:6px; font-weight:normal; cursor:pointer;">
        <input type="checkbox" name="remember" /> Remember me
      </label>
      <a href="#" style="color:#1a73e8; font-size:0.9rem; text-decoration:none;">Forgot password?</a>
    </div>
    <button type="submit" class="btn">Login</button>
  </form>
  <div class="form-footer">
    Don't have an account? <a href="register.html">Register here</a>
  </div>
</div>

<footer>
  <p>&copy; 2026 JobPortal. All rights reserved.</p>
</footer>

<script src="script.js"></script>
</body>
</html>
